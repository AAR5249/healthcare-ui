---
# Ansible Playbook: Install Dependencies
# Purpose: Install Docker, Node.js, and PostgreSQL on VPS
# Usage: ansible-playbook -i inventory install-dependencies.yml

- name: Install dependencies on VPS
  hosts: all
  become: yes
  gather_facts: yes
  vars:
    node_version: "20"
    postgres_version: "16"
    docker_compose_version: "2.23.0"

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - software-properties-common
          - git
          - jq
        state: present

    # Docker Installation
    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/{{ ansible_lsb.id | lower }}/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb https://download.docker.com/linux/{{ ansible_lsb.id | lower }} {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Install Docker Compose
      get_url:
        url: "https://github.com/docker/compose/releases/download/v{{ docker_compose_version }}/docker-compose-linux-{{ ansible_architecture }}"
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Add user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # Node.js Installation
    - name: Add Node.js repository
      shell: curl -fsSL https://deb.nodesource.com/setup_{{ node_version }}.x | bash -
      args:
        creates: /etc/apt/sources.list.d/nodesource.list

    - name: Install Node.js
      apt:
        name: nodejs
        state: present
        update_cache: yes

    # PostgreSQL Installation
    - name: Add PostgreSQL GPG key
      apt_key:
        url: https://www.postgresql.org/media/keys/ACCC4CF8.asc
        state: present

    - name: Add PostgreSQL repository
      apt_repository:
        repo: "deb http://apt.postgresql.org/pub/repos/apt {{ ansible_lsb.codename }}-pgdg main"
        state: present

    - name: Install PostgreSQL
      apt:
        name: "postgresql-{{ postgres_version }}"
        state: present
        update_cache: yes

    - name: Start and enable PostgreSQL
      service:
        name: postgresql
        state: started
        enabled: yes

    # Nginx Installation
    - name: Install Nginx
      apt:
        name: nginx
        state: present

    - name: Start and enable Nginx
      service:
        name: nginx
        state: started
        enabled: yes

    # Firewall Configuration
    - name: Install UFW
      apt:
        name: ufw
        state: present

    - name: Allow SSH through firewall
      ufw:
        rule: allow
        name: OpenSSH

    - name: Allow HTTP through firewall
      ufw:
        rule: allow
        port: "80"
        proto: tcp

    - name: Allow HTTPS through firewall
      ufw:
        rule: allow
        port: "443"
        proto: tcp

    - name: Allow application port through firewall
      ufw:
        rule: allow
        port: "8000"
        proto: tcp

    - name: Enable firewall
      ufw:
        state: enabled
        policy: deny

    # Redis Installation
    - name: Install Redis
      apt:
        name: redis-server
        state: present

    - name: Start and enable Redis
      service:
        name: redis-server
        state: started
        enabled: yes

    - name: Configure Redis to listen on all interfaces
      lineinfile:
        path: /etc/redis/redis.conf
        regexp: '^bind'
        line: 'bind 0.0.0.0'
        backup: yes
      notify: Restart Redis

  handlers:
    - name: Restart Redis
      service:
        name: redis-server
        state: restarted

    - name: Restart PostgreSQL
      service:
        name: postgresql
        state: restarted

    - name: Restart Docker
      service:
        name: docker
        state: restarted

  post_tasks:
    - name: Print installation summary
      debug:
        msg: |
          Installation complete!
          Docker: {{ ansible_docker is defined }}
          Node.js: {{ node_version }}
          PostgreSQL: {{ postgres_version }}
          Redis: Installed
          Nginx: Installed
          Firewall: Enabled
