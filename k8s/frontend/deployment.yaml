apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: medibook
    service: frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medibook
      service: frontend
  template:
    metadata:
      labels:
        app: medibook
        service: frontend
    spec:
      containers:
        - name: frontend
          image: local/medibook-frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  labels:
    app: medibook
    service: frontend
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 80
      protocol: TCP
      name: http
  selector:
    app: medibook
    service: frontend