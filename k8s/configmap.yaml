apiVersion: v1
kind: ConfigMap
metadata:
  name: medibook-config
data:
  GATEWAY_PORT: "8000"
  AUTH_PORT: "8001"
  APPOINTMENT_PORT: "8002"
  NOTIFICATION_PORT: "8003"
  JWT_EXPIRES_IN: "15m"
  REFRESH_TOKEN_EXPIRES_IN: "7d"
  NOTIFICATION_CHANNEL: "appointment_events"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@medibook.com"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
---
apiVersion: v1
kind: Secret
metadata:
  name: medibook-secrets
type: Opaque
stringData:
  DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/medibook"
  JWT_SECRET: "your-super-secret-jwt-key-change-in-production"
  REDIS_URL: "redis://redis:6379"
  SMTP_HOST: "smtp.example.com"
  SMTP_USER: "your-email@example.com"
  SMTP_PASS: "your-email-password"
