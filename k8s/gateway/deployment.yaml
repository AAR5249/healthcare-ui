p apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  labels:
    app: medibook
    service: gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medibook
      service: gateway
  template:
    metadata:
      labels:
        app: medibook
        service: gateway
    spec:
      containers:
        - name: gateway
          image: local/medibook-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: GATEWAY_PORT
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: JWT_SECRET
            - name: AUTH_SERVICE_URL
              value: http://auth-service:8001
            - name: APPOINTMENT_SERVICE_URL
              value: http://appointment-service:8002
            - name: NOTIFICATION_SERVICE_URL
              value: http://notification-service:8003
            - name: RATE_LIMIT_WINDOW_MS
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: RATE_LIMIT_WINDOW_MS
            - name: RATE_LIMIT_MAX_REQUESTS
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: RATE_LIMIT_MAX_REQUESTS
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: gateway
  labels:
    app: medibook
    service: gateway
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: medibook
    service: gateway