apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app: medibook
    service: auth
spec:
  replicas: 2
  selector:
    matchLabels:
      app: medibook
      service: auth
  template:
    metadata:
      labels:
        app: medibook
        service: auth
    spec:
      containers:
        - name: auth-service
          image: docker.io/local/medibook-auth-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: AUTH_PORT
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: DATABASE_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: JWT_SECRET
            - name: JWT_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: JWT_EXPIRES_IN
            - name: REFRESH_TOKEN_EXPIRES_IN
              valueFrom:
                configMapKeyRef:
                  name: medibook-config
                  key: REFRESH_TOKEN_EXPIRES_IN
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: medibook-secrets
                  key: REDIS_URL
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /auth/health
              port: 8001
            initialDelaySeconds: 10
            periodSeconds: 30
          livenessProbe:
            httpGet:
              path: /auth/health
              port: 8001
            initialDelaySeconds: 15
            periodSeconds: 60
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: medibook
    service: auth
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
      protocol: TCP
      name: http
  selector:
    app: medibook
    service: auth
