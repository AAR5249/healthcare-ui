version: '3.8'

services:
  # API Gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: medibook-gateway
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - AUTH_SERVICE_URL=http://auth-service:8001
      - APPOINTMENT_SERVICE_URL=http://appointment-service:8002
      - NOTIFICATION_SERVICE_URL=http://notification-service:8003
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
    depends_on:
      - auth-service
      - appointment-service
      - notification-service
      - postgres
      - redis
    networks:
      - medibook-network
    restart: unless-stopped

  # Auth Service
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: medibook-auth
    ports:
      - "8001:8001"
    environment:
      - NODE_ENV=development
      - PORT=8001
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/medibook}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key}
      - JWT_EXPIRES_IN=15m
      - REFRESH_TOKEN_EXPIRES_IN=7d
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - medibook-network
    restart: unless-stopped

  # Appointment Service
  appointment-service:
    build:
      context: .
      dockerfile: appointment-service/Dockerfile
    container_name: medibook-appointment
    ports:
      - "8002:8002"
    environment:
      - NODE_ENV=development
      - PORT=8002
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/medibook}
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_CHANNEL=appointment_events
    depends_on:
      - postgres
      - redis
    networks:
      - medibook-network
    restart: unless-stopped

  # Notification Service
  notification-service:
    build:
      context: .
      dockerfile: notification-service/Dockerfile
    container_name: medibook-notification
    ports:
      - "8003:8003"
    environment:
      - NODE_ENV=development
      - PORT=8003
      - DATABASE_URL=${DATABASE_URL:-postgresql://postgres:postgres@postgres:5432/medibook}
      - REDIS_URL=redis://redis:6379
      - NOTIFICATION_CHANNEL=appointment_events
      - SMTP_HOST=${SMTP_HOST:-smtp.example.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@medibook.com}
    depends_on:
      - postgres
      - redis
    networks:
      - medibook-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: medibook-postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=medibook
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - medibook-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: medibook-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - medibook-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Prometheus for Monitoring
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: medibook-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - medibook-network
    restart: unless-stopped

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:10.2.0
    container_name: medibook-grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - medibook-network
    restart: unless-stopped

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: medibook-frontend
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=/api
    depends_on:
      - gateway
    networks:
      - medibook-network
    restart: unless-stopped

networks:
  medibook-network:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
